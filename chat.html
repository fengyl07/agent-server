<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>告警智能助手 · Alert Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #eef1f6;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat {
      display: flex;
      flex-direction: column;
      width: 900px;
      max-width: 96vw;
      height: 92vh;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .chat__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: linear-gradient(90deg, #2e74b5, #3d8bd4);
      color: #fff;
    }
    .chat__header h1 { font-size: 16px; font-weight: 600; }
    .chat__header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .chat__clear {
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: transparent;
      color: #fff;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .chat__clear:hover { background: rgba(255, 255, 255, 0.15); }

    .chat__body {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #f7f8fa;
    }

    .empty { margin-top: 32px; text-align: center; color: #999; }
    .empty p { margin-bottom: 16px; }
    .quick { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .quick button {
      border: 1px solid #d0d7e2;
      background: #fff;
      color: #2e74b5;
      padding: 6px 14px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 13px;
    }
    .quick button:hover { background: #eaf2fb; }

    .row { display: flex; margin-bottom: 14px; }
    .row.user { justify-content: flex-end; }
    .row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 74%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user { background: #2e74b5; color: #fff; border-top-right-radius: 2px; }
    .bubble.assistant { background: #fff; border: 1px solid #e5e8ee; border-top-left-radius: 2px; }
    .bubble.error { background: #fff1f0; border-color: #ffa39e; color: #cf1322; }

    .intent {
      display: inline-block;
      margin-top: 8px;
      padding: 0 8px;
      font-size: 11px;
      line-height: 18px;
      color: #888;
      background: #f0f2f5;
      border-radius: 3px;
    }

    .dots i {
      display: inline-block;
      width: 6px; height: 6px;
      margin: 0 2px;
      background: #bbb;
      border-radius: 50%;
      animation: blink 1.2s infinite both;
    }
    .dots i:nth-child(2) { animation-delay: 0.2s; }
    .dots i:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

    .chat__footer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid #eef0f3;
      background: #fff;
    }
    .chat__footer textarea {
      flex: 1;
      resize: none;
      border: 1px solid #d0d7e2;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      outline: none;
    }
    .chat__footer textarea:focus { border-color: #2e74b5; }
    .chat__send {
      border: none;
      background: #2e74b5;
      color: #fff;
      padding: 0 22px;
      height: 40px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
    }
    .chat__send:disabled { background: #9db8d4; cursor: not-allowed; }
    .chat__send:hover:not(:disabled) { background: #2862a0; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="chat__header">
      <div>
        <h1>告警智能助手 · Alert Agent</h1>
        <div class="sub">基于 MCP + RAG + Tool Calling，可查告警、查处置 SOP</div>
      </div>
      <button class="chat__clear" onclick="ChatApp.reset()">清空对话</button>
    </div>

    <div class="chat__body" id="body">
      <div class="empty" id="empty">
        <p>你好，我是告警研判助手，可以问我告警查询和处置建议。</p>
        <div class="quick">
          <button onclick="ChatApp.quick('今天有多少告警？')">今天有多少告警？</button>
          <button onclick="ChatApp.quick('查询最近的未关闭告警')">查询最近的未关闭告警</button>
          <button onclick="ChatApp.quick('磁盘使用率过高怎么处理？')">磁盘使用率过高怎么处理？</button>
        </div>
      </div>
    </div>

    <div class="chat__footer">
      <textarea id="input" rows="1" placeholder="输入问题，Enter 发送，Shift+Enter 换行"
        oninput="ChatApp.autoGrow(this)"
        onkeydown="ChatApp.onKeyDown(event)"></textarea>
      <button class="chat__send" id="send" onclick="ChatApp.send()">发送</button>
    </div>
  </div>

  <script>
    (function () {
      // 由服务器 static 托管时用同源相对路径；若本地 file:// 双击打开，则指向服务器地址（按需修改 IP/端口）
      var API_BASE = location.protocol === 'file:' ? 'http://10.1.53.34:8091' : '';
      var CHAT_API = API_BASE + '/alertagent/frontapi/v1/agent/chat';

      var sessionId = 'web-' + Date.now();
      var loading = false;

      var bodyEl = document.getElementById('body');
      var emptyEl = document.getElementById('empty');
      var inputEl = document.getElementById('input');
      var sendEl = document.getElementById('send');

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function hideEmpty() {
        if (emptyEl) { emptyEl.style.display = 'none'; }
      }

      function scrollBottom() {
        bodyEl.scrollTop = bodyEl.scrollHeight;
      }

      function appendMessage(role, content, opts) {
        opts = opts || {};
        hideEmpty();
        var row = document.createElement('div');
        row.className = 'row ' + role;
        var bubble = document.createElement('div');
        bubble.className = 'bubble ' + role + (opts.error ? ' error' : '');
        bubble.innerHTML = escapeHtml(content);
        if (role === 'assistant' && opts.intent) {
          var tag = document.createElement('span');
          tag.className = 'intent';
          tag.textContent = opts.intent;
          bubble.appendChild(document.createElement('br'));
          bubble.appendChild(tag);
        }
        row.appendChild(bubble);
        bodyEl.appendChild(row);
        scrollBottom();
        return row;
      }

      function appendLoading() {
        hideEmpty();
        var row = document.createElement('div');
        row.className = 'row assistant';
        row.id = 'loading-row';
        row.innerHTML = '<div class="bubble assistant"><span class="dots"><i></i><i></i><i></i></span></div>';
        bodyEl.appendChild(row);
        scrollBottom();
      }

      function removeLoading() {
        var el = document.getElementById('loading-row');
        if (el) { el.parentNode.removeChild(el); }
      }

      function setLoading(v) {
        loading = v;
        sendEl.disabled = v;
        inputEl.disabled = v;
      }

      var ChatApp = {
        autoGrow: function (el) {
          el.style.height = 'auto';
          el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        },

        onKeyDown: function (e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            ChatApp.send();
          }
        },

        quick: function (text) {
          inputEl.value = text;
          ChatApp.send();
        },

        reset: function () {
          bodyEl.innerHTML = '';
          if (emptyEl) {
            bodyEl.appendChild(emptyEl);
            emptyEl.style.display = 'block';
          }
          sessionId = 'web-' + Date.now();
          inputEl.value = '';
          ChatApp.autoGrow(inputEl);
        },

        send: function () {
          var text = (inputEl.value || '').trim();
          if (!text || loading) { return; }

          appendMessage('user', text);
          inputEl.value = '';
          ChatApp.autoGrow(inputEl);
          setLoading(true);
          appendLoading();

          fetch(CHAT_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, sessionId: sessionId })
          })
            .then(function (res) {
              if (!res.ok) { throw new Error('HTTP ' + res.status); }
              return res.json();
            })
            .then(function (data) {
              removeLoading();
              setLoading(false);
              data = data || {};
              appendMessage('assistant', data.reply || '未能生成回复，请换个问法试试。', { intent: data.intent });
            })
            .catch(function (e) {
              removeLoading();
              setLoading(false);
              appendMessage('assistant', '请求失败：' + (e && e.message ? e.message : '网络异常，请稍后再试'), { error: true });
            });
        }
      };

      window.ChatApp = ChatApp;
      inputEl.focus();
    })();
  </script>
</body>
</html>
